<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-950 text-gray-200">
    <div class="max-w-7xl mx-auto flex h-screen">
        <!-- Left Panel -->
        <div class="w-96 bg-gray-900 p-6 border-r border-gray-700">
            <h1 class="text-2xl font-bold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-pills text-emerald-500"></i> MedManager
            </h1>
            
            <h2 class="text-lg mb-4">Add Medicine</h2>
            <input id="medicineInput" 
                   type="text" 
                   class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-emerald-500"
                   placeholder="Enter medicine name...">
            
            <button onclick="addMedicine()" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-semibold">
                    ADD MEDICINE
            </button>
        </div>

        <!-- Main Area -->
        <div class="flex-1 p-8 overflow-auto">
            <h1 class="text-3xl font-bold mb-6">Your Medicines</h1>
            <div id="medicinesContainer" class="flex flex-wrap gap-3"></div>
            <div id="emptyState" class="hidden text-center py-20">
                <p class="text-gray-500 text-xl">No medicines added yet</p>
            </div>
        </div>
    </div>

    <script>
        // ================== PASTE YOUR NEW CONFIG HERE ==================
        const firebaseConfig = {
            apiKey: "AIzaSyCxF0X080EPLT6dE_MykC0Lcd...",   // ← Replace this whole object
            authDomain: "test-website-22778.firebaseapp.com",
            projectId: "test-website-22778",
            storageBucket: "test-website-22778.firebasestorage.app",
            messagingSenderId: "862083661951",
            appId: "1:862083661951:web:838f650debb207a2fe7f14a"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const medicinesRef = db.collection("medicines");

        let medicines = [];

        function renderMedicines() {
            const container = document.getElementById("medicinesContainer");
            const empty = document.getElementById("emptyState");
            container.innerHTML = "";

            if (medicines.length === 0) {
                empty.classList.remove("hidden");
                return;
            }
            empty.classList.add("hidden");

            medicines.forEach(med => {
                const div = document.createElement("div");
                div.className = "bg-gray-800 border border-gray-700 hover:border-red-500 rounded-3xl px-5 py-3 flex items-center gap-3 group";
                div.innerHTML = `
                    <span>${med.name}</span>
                    <button onclick="deleteMedicine('${med.id}')" 
                            class="ml-auto text-gray-400 group-hover:text-red-500">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        async function addMedicine() {
            const input = document.getElementById("medicineInput");
            const name = input.value.trim();
            if (!name) return alert("Enter medicine name");

            try {
                await medicinesRef.add({
                    name: name,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
                console.log("✅ Medicine added successfully");
            } catch (e) {
                console.error("Error:", e);
                alert("Failed to add. Check console (F12)");
            }
        }

        async function deleteMedicine(id) {
            if (confirm("Delete this medicine?")) {
                await medicinesRef.doc(id).delete();
            }
        }

        // Real-time updates
        function loadData() {
            medicinesRef.orderBy("createdAt", "desc").onSnapshot(snapshot => {
                medicines = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderMedicines();
            });
        }

        // Start
        window.onload = () => {
            loadData();
            console.log("🚀 Medicine App Started - Check console for errors");
        };
    </script>
</body>
</html>
