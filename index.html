<script>
// ================== FIREBASE CONFIG ==================
const firebaseConfig = {

  authDomain: "test-website-22778.firebaseapp.com",
  projectId: "test-website-22778",

  messagingSenderId: "862083661951",
  appId: "1:862083661951:web:838f650debb207a2fe7f14a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ================== AUTH FUNCTIONS ==================
function toggleAuth() {
  document.getElementById('loginForm').classList.toggle('hidden');
  document.getElementById('registerForm').classList.toggle('hidden');
}

async function register() {
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  try {
    await auth.createUserWithEmailAndPassword(email, password);
  } catch (e) { alert(e.message); }
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (e) { alert(e.message); }
}

async function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch (e) { alert(e.message); }
}

function logout() {
  auth.signOut();
}

function showForgotPassword() {
  const email = prompt("Enter your email for password reset:");
  if (email) {
    auth.sendPasswordResetEmail(email)
      .then(() => alert("Password reset link sent!"))
      .catch(e => alert(e.message));
  }
}

// ================== FIRESTORE HELPERS ==================
const userMedsRef = () => db.collection('users').doc(auth.currentUser.uid).collection('medicines');
const userPrescriptionsRef = () => db.collection('users').doc(auth.currentUser.uid).collection('prescriptions');

// Auth State Listener
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userEmail').textContent = user.email;
    
    loadUserData();
  } else {
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
  }
});

// Load user medicines from Firestore
async function loadUserData() {
  // Load medicines
  userMedsRef().onSnapshot(snapshot => {
    medicines = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
    renderMedicineList();
    renderMostUsed();
  });
}

// Example: Save medicine to Firestore
async function saveMedicine(med) {
  await userMedsRef().add(med);
}
