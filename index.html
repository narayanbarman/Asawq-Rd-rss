<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FastRx Pro - Sign In / Sign Up</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // Your Firebase configuration (REPLACE WITH YOUR OWN CONFIG)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        
        // DOM Elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authBtn = document.getElementById('authBtn');
        const messageDiv = document.getElementById('message');
        const googleBtn = document.getElementById('googleBtn');
        const forgotPasswordLink = document.getElementById('forgotPassword');
        
        // Show message function
        function showMessage(text, isError = true) {
            messageDiv.textContent = text;
            messageDiv.className = isError ? 'message error' : 'message success';
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // Clear message
        function clearMessage() {
            messageDiv.style.display = 'none';
        }
        
        // Smart Sign In / Sign Up Function
        async function handleAuth() {
            clearMessage();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Validation
            if (!email || !password) {
                showMessage('Please enter both email and password');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters');
                return;
            }
            
            // Show loading state
            authBtn.disabled = true;
            authBtn.textContent = 'Processing...';
            
            try {
                // First try: Sign In (existing user)
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log('Existing user signed in:', userCredential.user.email);
                showMessage(`Welcome back ${userCredential.user.email}! Redirecting...`, false);
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = '/dashboard.html'; // Change to your dashboard page
                }, 2000);
                
            } catch (error) {
                // If user not found, create new account
                if (error.code === 'auth/user-not-found') {
                    try {
                        const newUserCredential = await createUserWithEmailAndPassword(auth, email, password);
                        console.log('New user created:', newUserCredential.user.email);
                        showMessage(`Account created successfully! Welcome ${newUserCredential.user.email}! Redirecting...`, false);
                        
                        setTimeout(() => {
                            window.location.href = '/dashboard.html'; // Change to your dashboard page
                        }, 2000);
                        
                    } catch (signUpError) {
                        // Handle sign-up errors
                        if (signUpError.code === 'auth/email-already-in-use') {
                            showMessage('Account exists but password is incorrect. Please reset your password.');
                        } else if (signUpError.code === 'auth/weak-password') {
                            showMessage('Password is too weak. Please use at least 6 characters.');
                        } else if (signUpError.code === 'auth/invalid-email') {
                            showMessage('Invalid email format. Please enter a valid email.');
                        } else {
                            showMessage('Error creating account: ' + signUpError.message);
                        }
                        console.error('Sign up error:', signUpError);
                    }
                } 
                // Handle wrong password for existing user
                else if (error.code === 'auth/wrong-password') {
                    showMessage('Incorrect password. Please try again or click "Forgot password?"');
                }
                // Handle invalid email
                else if (error.code === 'auth/invalid-email') {
                    showMessage('Invalid email format. Please enter a valid email.');
                }
                // Handle other errors
                else {
                    showMessage('Authentication error: ' + error.message);
                    console.error('Auth error:', error);
                }
            } finally {
                // Reset button state
                authBtn.disabled = false;
                authBtn.textContent = 'Sign In / Sign Up';
            }
        }
        
        // Google Sign In
        async function handleGoogleSignIn() {
            clearMessage();
            authBtn.disabled = true;
            googleBtn.disabled = true;
            
            try {
                const result = await signInWithPopup(auth, googleProvider);
                console.log('Google sign in:', result.user.email);
                showMessage(`Welcome ${result.user.displayName || result.user.email}! Redirecting...`, false);
                
                setTimeout(() => {
                    window.location.href = '/dashboard.html'; // Change to your dashboard page
                }, 2000);
                
            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user') {
                    showMessage('Sign in cancelled. Please try again.');
                } else if (error.code === 'auth/account-exists-with-different-credential') {
                    showMessage('An account already exists with the same email but different sign-in method.');
                } else {
                    showMessage('Google sign in failed: ' + error.message);
                }
                console.error('Google auth error:', error);
            } finally {
                authBtn.disabled = false;
                googleBtn.disabled = false;
            }
        }
        
        // Forgot Password
        async function handleForgotPassword() {
            const email = emailInput.value.trim();
            
            if (!email) {
                showMessage('Please enter your email address first');
                return;
            }
            
            // You can implement password reset email here
            showMessage(`Password reset link would be sent to ${email} (configure email settings in Firebase)`, false);
            console.log('Password reset requested for:', email);
        }
        
        // Event Listeners
        authBtn.addEventListener('click', handleAuth);
        googleBtn.addEventListener('click', handleGoogleSignIn);
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            handleForgotPassword();
        });
        
        // Enter key press
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleAuth();
            }
        });
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleAuth();
            }
        });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Full responsive layout - FIXES DESKTOP CUTOFF ISSUE */
        html, body {
            width: 100%;
            min-height: 100vh;
            height: auto;
            overflow-x: hidden;
            overflow-y: auto !important;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Main Container - Scrolls if needed */
        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* Form Section */
        .form-section {
            padding: 30px;
        }
        
        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* Button */
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 15px;
        }
        
        .auth-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* Divider */
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }
        
        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
            font-size: 14px;
        }
        
        /* Google Button */
        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        .google-btn:hover:not(:disabled) {
            background: #f8f9fa;
            border-color: #667eea;
        }
        
        .google-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* Forgot Password */
        .forgot-password {
            text-align: center;
            display: block;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin-top: 15px;
            transition: color 0.3s ease;
        }
        
        .forgot-password:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        /* Message Box */
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        
        /* Responsive Design - FIXES LAPTOP/DESKTOP ISSUES */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .container {
                max-width: 100%;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .form-section {
                padding: 25px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 22px;
            }
            
            .form-section {
                padding: 20px;
            }
            
            .input-group input {
                font-size: 14px;
                padding: 10px 12px;
            }
            
            .auth-btn, .google-btn {
                padding: 12px;
                font-size: 14px;
            }
        }
        
        /* For very small heights (ensures scroll works) */
        @media (max-height: 600px) {
            body {
                align-items: flex-start;
                padding: 20px;
            }
            
            .container {
                margin: 20px auto;
            }
        }
        
        /* Print styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .auth-btn, .google-btn, .forgot-password {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FastRx Pro</h1>
            <p>Enter your email and password to sign in.<br>If you're new, we'll automatically create your account.</p>
        </div>
        
        <div class="form-section">
            <div id="message" class="message"></div>
            
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
            </div>
            
            <button id="authBtn" class="auth-btn">Sign In / Sign Up</button>
            
            <div class="divider">
                <span>or</span>
            </div>
            
            <button id="googleBtn" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
            
            <a href="#" id="forgotPassword" class="forgot-password">Forgot password?</a>
        </div>
    </div>
</body>
</html>
