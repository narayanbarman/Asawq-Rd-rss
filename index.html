<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://qejpughcbxosjdcahqzm.supabase.co',
  'sb_publishable_l6259X-5NrXjszGC3ex9Hw_pl9ieLfo'
)

async function signInGoogle(){
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      // This tells Supabase exactly where to send the user after a successful login
      redirectTo: 'https://narayanbarman.github.io/Asawq-Rd-rss/'
    }
  })
}

document
.getElementById('googleLoginBtn')
.addEventListener('click', signInGoogle)

async function checkUser(){
  const { data } = await supabase.auth.getUser()

  if(data && data.user){
    document.getElementById('userBox').innerHTML = `
      <p>Logged in as:</p>
      <b>${data.user.email}</b>
      <br><br>
      <button onclick="logout()">Logout</button>
    `
  }
}

window.logout = async function(){
  await supabase.auth.signOut()
  location.reload()
}

checkUser()
</script>
