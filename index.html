    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider, 
            sendPasswordResetEmail, 
            signOut,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Verified directly from your Firebase Project Settings console
        const firebaseConfig = {
            apiKey: "AIzaSyCFXO8oEPLTGdE_MykCDlcDFZkdcd8s59o",
            authDomain: "test-website-22778.firebaseapp.com",
            databaseURL: "https://test-website-22778-default-rtdb.firebaseio.com",
            projectId: "test-website-22778",
            storageBucket: "test-website-22778.appspot.com",
            messagingSenderId: "862083661951",
            appId: "1:862083661951:web:838f650debb207a2fe7f4a",
            measurementId: "G-9E6RYDKSJS"
        };

        // Initialization
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // DOM elements selectors
        const authCard = document.getElementById('authCard');
        const dashboardCard = document.getElementById('dashboardCard');
        const loginForm = document.getElementById('loginForm');
        const forgotForm = document.getElementById('forgotForm');
        
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const socialDivider = document.getElementById('socialDivider');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const alertBox = document.getElementById('alertBox');
        const userDisplayEmail = document.getElementById('userDisplayEmail');

        // Helper: Show custom alerts on screen
        function showAlert(message, isSuccess = false) {
            alertBox.textContent = message;
            alertBox.className = `mb-4 p-3 rounded-lg text-sm font-medium border text-center ${
                isSuccess 
                ? 'bg-emerald-50 border-emerald-200 text-emerald-700' 
                : 'bg-rose-50 border-rose-200 text-rose-700'
            }`;
        }

        function clearAlert() {
            alertBox.className = 'hidden';
            alertBox.textContent = '';
        }

        // View Toggles
        document.getElementById('goToForgotBtn').addEventListener('click', () => {
            clearAlert();
            loginForm.classList.add('hidden');
            socialDivider.classList.add('hidden');
            googleSignInBtn.classList.add('hidden');
            forgotForm.classList.remove('hidden');
            formTitle.textContent = "Reset Password";
            formSubtitle.textContent = "Enter your email to receive a recovery link";
        });

        document.getElementById('backToLoginBtn').addEventListener('click', () => {
            clearAlert();
            forgotForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            socialDivider.classList.remove('hidden');
            googleSignInBtn.classList.remove('hidden');
            formTitle.textContent = "Welcome Back";
            formSubtitle.textContent = "Please enter your details to sign in";
        });

        // 1. Firebase Email & Password Authentication
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlert();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                showAlert(error.message.replace("Firebase: ", ""));
            }
        });

        // 2. Firebase Google Single Sign-In
        googleSignInBtn.addEventListener('click', async () => {
            clearAlert();
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (error) {
                showAlert(error.message.replace("Firebase: ", ""));
            }
        });

        // 3. Firebase Password Reset Functionality
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlert();
            const email = document.getElementById('forgotEmail').value;

            try {
                await sendPasswordResetEmail(auth, email);
                showAlert("Reset link sent successfully! Check your inbox.", true);
                document.getElementById('forgotEmail').value = "";
            } catch (error) {
                showAlert(error.message.replace("Firebase: ", ""));
            }
        });

        // 4. Firebase Logout Request
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                alert("Error signing out: " + error.message);
            }
        });

        // 5. Reactive Authentication State Management
        onAuthStateChanged(auth, (user) => {
            clearAlert();
            if (user) {
                authCard.classList.add('hidden');
                dashboardCard.classList.remove('hidden');
                userDisplayEmail.textContent = user.email;
                
                loginForm.reset();
                forgotForm.reset();
            } else {
                dashboardCard.classList.add('hidden');
                authCard.classList.remove('hidden');
            }
        });
    </script>
