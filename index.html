    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider, 
            sendPasswordResetEmail, 
            signOut,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFXO8oEPLTGdE_MykCDlcDFZkdcd8s59o",
            authDomain: "test-website-22778.firebaseapp.com",
            databaseURL: "https://test-website-22778-default-rtdb.firebaseio.com",
            projectId: "test-website-22778",
            storageBucket: "test-website-22778.appspot.com",
            messagingSenderId: "862083661951",
            appId: "1:862083661951:web:838f650debb207a2fe7f4a",
            measurementId: "G-9E6RYDKSJS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const authCard = document.getElementById('authCard');
        const dashboardCard = document.getElementById('dashboardCard');
        const loginForm = document.getElementById('loginForm');
        const forgotForm = document.getElementById('forgotForm');
        const alertBox = document.getElementById('alertBox');
        const userDisplayEmail = document.getElementById('userDisplayEmail');

        function showAlert(message, isSuccess = false) {
            alertBox.textContent = message;
            alertBox.className = `mb-4 p-3 rounded-lg text-sm font-medium border text-center ${
                isSuccess ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-rose-50 border-rose-200 text-rose-700'
            }`;
        }

        function clearAlert() {
            alertBox.className = 'hidden';
            alertBox.textContent = '';
        }

        // SMART LOGIN + SIGNUP FORM FUNCTION
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlert();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                // Step 1: Try to sign in the user
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                // Step 2: If the user doesn't exist, automatically create an account for them!
                if (error.code === 'auth/user-not-found' || error.message.includes('INVALID_LOGIN_CREDENTIALS')) {
                    try {
                        showAlert("Creating a new account for you...", true);
                        await createUserWithEmailAndPassword(auth, email, password);
                    } catch (signUpError) {
                        showAlert(signUpError.message.replace("Firebase: ", ""));
                    }
                } else {
                    showAlert(error.message.replace("Firebase: ", ""));
                }
            }
        });

        // Google Sign-In
        document.getElementById('googleSignInBtn').addEventListener('click', async () => {
            clearAlert();
            try { await signInWithPopup(auth, googleProvider); } catch (error) { showAlert(error.message.replace("Firebase: ", "")); }
        });

        // Forgot Password Link Trigger
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlert();
            try {
                await sendPasswordResetEmail(auth, document.getElementById('forgotEmail').value);
                showAlert("Reset link sent to your email! Please check spam folder.", true);
                document.getElementById('forgotEmail').value = "";
            } catch (error) {
                showAlert(error.message.replace("Firebase: ", ""));
            }
        });

        // Logout Event
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try { await signOut(auth); } catch (error) { alert(error.message); }
        });

        // App View State Router
        onAuthStateChanged(auth, (user) => {
            clearAlert();
            if (user) {
                authCard.classList.add('hidden');
                dashboardCard.classList.remove('hidden');
                userDisplayEmail.textContent = user.email;
            } else {
                dashboardCard.classList.add('hidden');
                authCard.classList.remove('hidden');
            }
        });
    </script>
