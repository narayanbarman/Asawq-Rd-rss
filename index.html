<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans antialiased min-h-screen flex items-center justify-center text-slate-900">

    <div id="loadingFallback" class="p-6 text-center max-w-sm bg-white rounded-xl shadow-md border border-slate-200">
        <p class="text-slate-600 font-medium">Loading Application UI...</p>
        <p class="text-xs text-slate-400 mt-2">If this screen stays blank or stuck, please check your internet connection or console log rules.</p>
    </div>

    <div id="mainAppWrapper" class="hidden w-full max-w-md p-4">
        
        <div id="authCard" class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100 transition-all duration-300">
            <div class="text-center mb-8">
                <h2 id="formTitle" class="text-3xl font-extrabold text-slate-800 tracking-tight">Welcome Back</h2>
                <p id="formSubtitle" class="text-sm text-slate-500 mt-2">Please enter your details to sign in</p>
            </div>

            <div id="alertBox" class="hidden mb-4 p-3 rounded-lg text-sm font-medium border"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="email" id="loginEmail" required 
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition" 
                            placeholder="name@example.com">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-semibold text-slate-700">Password</label>
                        <button type="button" id="goToForgotBtn" class="text-sm font-semibold text-indigo-600 hover:text-indigo-700 transition">Forgot password?</button>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="loginPassword" required 
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition" 
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="loginSubmitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-md transition">
                    Sign In
                </button>
            </form>

            <form id="forgotForm" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Registered Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="email" id="forgotEmail" required 
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition" 
                            placeholder="name@example.com">
                    </div>
                </div>

                <button type="submit" id="forgotSubmitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-md transition">
                    Send Reset Link
                </button>

                <button type="button" id="backToLoginBtn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition">
                    Back to Login
                </button>
            </form>

            <div id="socialDivider" class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-3 text-slate-400 font-medium">Or continue with</span></div>
            </div>

            <button type="button" id="googleSignInBtn" class="w-full border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold py-3 rounded-xl transition flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
        </div>

        <div id="dashboardCard" class="hidden bg-white rounded-2xl shadow-xl p-8 border border-slate-100 text-center">
            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-500 text-2xl">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Authentication Successful</h2>
            <p id="userDisplayEmail" class="text-slate-500 text-sm mt-1 mb-6">user@example.com</p>
            <hr class="border-slate-100 my-6">
            <button type="button" id="logoutBtn" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 font-semibold py-3 rounded-xl transition">
                Sign Out
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider, 
            sendPasswordResetEmail, 
            signOut,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase configuration profile
        
const firebaseConfig = {
  apiKey: "AIzaSyCFXO8oEPLTGdE_MykCDlcDfZKdcd0s59o",
  authDomain: "test-website-22778.firebaseapp.com",
  databaseURL: "https://test-website-22778-default-rtdb.firebaseio.com",
  projectId: "test-website-22778",
  storageBucket: "test-website-22778.firebasestorage.app",
  messagingSenderId: "862083661951",
  appId: "1:862083661951:web:838f650debb207a2fe7f4a",
  measurementId: "G-9E5RYBBKJS"
};
        // Standard initialization fallback check
        document.addEventListener("DOMContentLoaded", () => {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const googleProvider = new GoogleAuthProvider();

                // Interface management targets
                const loadingFallback = document.getElementById('loadingFallback');
                const mainAppWrapper = document.getElementById('mainAppWrapper');
                const authCard = document.getElementById('authCard');
                const dashboardCard = document.getElementById('dashboardCard');
                const loginForm = document.getElementById('loginForm');
                const forgotForm = document.getElementById('forgotForm');
                const formTitle = document.getElementById('formTitle');
                const formSubtitle = document.getElementById('formSubtitle');
                const socialDivider = document.getElementById('socialDivider');
                const googleSignInBtn = document.getElementById('googleSignInBtn');
                const alertBox = document.getElementById('alertBox');
                const userDisplayEmail = document.getElementById('userDisplayEmail');

                // Reveal interface safely once modules compile
                loadingFallback.classList.add('hidden');
                mainAppWrapper.classList.remove('hidden');

                function showAlert(message, isSuccess = false) {
                    alertBox.textContent = message;
                    alertBox.className = `mb-4 p-3 rounded-lg text-sm font-medium border text-center ${
                        isSuccess ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-rose-50 border-rose-200 text-rose-700'
                    }`;
                }

                function clearAlert() {
                    alertBox.className = 'hidden';
                    alertBox.textContent = '';
                }

                // Interaction routes
                document.getElementById('goToForgotBtn').addEventListener('click', () => {
                    clearAlert();
                    loginForm.classList.add('hidden');
                    socialDivider.classList.add('hidden');
                    googleSignInBtn.classList.add('hidden');
                    forgotForm.classList.remove('hidden');
                    formTitle.textContent = "Reset Password";
                    formSubtitle.textContent = "Enter your email to receive a recovery link";
                });

                document.getElementById('backToLoginBtn').addEventListener('click', () => {
                    clearAlert();
                    forgotForm.classList.add('hidden');
                    loginForm.classList.remove('hidden');
                    socialDivider.classList.remove('hidden');
                    googleSignInBtn.classList.remove('hidden');
                    formTitle.textContent = "Welcome Back";
                    formSubtitle.textContent = "Please enter your details to sign in";
                });

                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    clearAlert();
                    try {
                        await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
                    } catch (error) {
                        showAlert(error.message.replace("Firebase: ", ""));
                    }
                });

                googleSignInBtn.addEventListener('click', async () => {
                    clearAlert();
                    try {
                        await signInWithPopup(auth, googleProvider);
                    } catch (error) {
                        showAlert(error.message.replace("Firebase: ", ""));
                    }
                });

                forgotForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    clearAlert();
                    try {
                        await sendPasswordResetEmail(auth, document.getElementById('forgotEmail').value);
                        showAlert("Reset link sent to your email!", true);
                        document.getElementById('forgotEmail').value = "";
                    } catch (error) {
                        showAlert(error.message.replace("Firebase: ", ""));
                    }
                });

                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    try { await signOut(auth); } catch (error) { alert(error.message); }
                });

                onAuthStateChanged(auth, (user) => {
                    clearAlert();
                    if (user) {
                        authCard.classList.add('hidden');
                        dashboardCard.classList.remove('hidden');
                        userDisplayEmail.textContent = user.email;
                    } else {
                        dashboardCard.classList.add('hidden');
                        authCard.classList.remove('hidden');
                    }
                });

            } catch (globalError) {
                document.getElementById('loadingFallback').innerHTML = `
                    <p class="text-rose-600 font-bold">Initialization Error</p>
                    <p class="text-xs text-slate-500 mt-2">${globalError.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
