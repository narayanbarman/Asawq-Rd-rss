<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication System</title>
    <!-- Tailwind CSS for clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- MAIN CONTAINER -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6">
        
        <!-- GLOBAL ALERT BOX FOR ERROR/SUCCESS MESSAGES -->
        <div id="alertBox" class="hidden"></div>

        <!-- AUTHENTICATION CARD (LOGIN & SIGNUP) -->
        <div id="authCard">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800" id="formTitle">Welcome Back</h2>
                <p class="text-sm text-slate-500 mt-1" id="formSubtitle">Enter details to sign in or create an account</p>
            </div>

            <!-- Main Interactive Form -->
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="••••••••">
                </div>
                
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition dynamic-btn">
                    Sign In / Sign Up
                </button>
            </form>

            <!-- Forgot Password Dynamic Switcher -->
            <div class="text-center mt-4">
                <button id="showForgotBtn" class="text-sm text-indigo-600 hover:underline">Forgot Password?</button>
            </div>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                <div class="relative flex justify-center text-sm"><span class="bg-white px-2 text-slate-500">Or continue with</span></div>
            </div>

            <!-- Google Sign-In Button -->
            <button id="googleSignInBtn" class="w-full flex items-center justify-center gap-2 border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 font-medium py-2 rounded-lg transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.11C18.422 1.214 15.6 0 12.24 0 5.58 0 0 5.37 0 12s5.58 12 12.24 12c6.96 0 11.57-4.834 11.57-11.644 0-.784-.085-1.383-.188-2.071H12.24z"/></svg>
                Sign in with Google
            </button>
        </div>

        <!-- FORGOT PASSWORD PANELS -->
        <div id="forgotCard" class="hidden">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Reset Password</h2>
                <p class="text-sm text-slate-500 mt-1">Enter your registered email to receive a recovery link</p>
            </div>
            <form id="forgotForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Registered Email Address</label>
                    <input type="email" id="forgotEmail" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="name@example.com">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition">
                    Send Reset Link
                </button>
                <button type="button" id="backToLoginBtn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2 rounded-lg transition">
                    Back to Login
                </button>
            </form>
        </div>

        <!-- SECURE SYSTEM DASHBOARD (VISIBLE ONLY AFTER ACCESS GRANTED) -->
        <div id="dashboardCard" class="hidden text-center space-y-4">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Login Successful!</h2>
            <p class="text-slate-600 text-sm">Welcome to your dashboard terminal session.</p>
            <div class="p-3 bg-slate-50 border border-slate-200 rounded-lg font-mono text-xs text-slate-700" id="userDisplayEmail"></div>
            <button id="logoutBtn" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-medium py-2 rounded-lg transition">
                Secure Logout
            </button>
        </div>

    </div>

    <!-- CODE CONTROLLER ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider, 
            sendPasswordResetEmail, 
            signOut,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Configuration Linking
        const firebaseConfig = {
            apiKey: "AIzaSyCFXO8oEPLTGdE_MykCDlcDFZkdcd8s59o",
            authDomain: "test-website-22778.firebaseapp.com",
            databaseURL: "https://test-website-22778-default-rtdb.firebaseio.com",
            projectId: "test-website-22778",
            storageBucket: "test-website-22778.appspot.com",
            messagingSenderId: "862083661951",
            appId: "1:862083661951:web:838f650debb207a2fe7f4a",
            measurementId: "G-9E6RYDKSJS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // UI Element Selectors
        const authCard = document.getElementById('authCard');
        const forgotCard = document.getElementById('forgotCard');
        const dashboardCard = document.getElementById('dashboardCard');
        const loginForm = document.getElementById('loginForm');
        const forgotForm = document.getElementById('forgotForm');
        const alertBox = document.getElementById('alertBox');
        const userDisplayEmail = document.getElementById('userDisplayEmail');

        function showAlert(message, isSuccess = false) {
            alertBox.textContent = message;
            alertBox.className = `mb-4 p-3 rounded-lg text-sm font-medium border text-center ${
                isSuccess ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-rose-50 border-rose-200 text-rose-700'
            }`;
        }

        function clearAlert() {
            alertBox.className = 'hidden';
            alertBox.textContent = '';
        }

        // --- AUTOMATED SIGN IN / SIGN UP LOGIC ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlert();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                // Step 1: Attempt normal login
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                // Step 2: If the email doesn't exist in the system, automatically create it!
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential' || error.message.includes('INVALID_LOGIN_CREDENTIALS')) {
                    try {
                        showAlert("Account not found. Automatically creating a new account for you...", true);
                        await createUserWithEmailAndPassword(auth, email, password);
                    } catch (signUpError) {
                        showAlert("Registration Error: " + signUpError.message.replace("Firebase: ", ""));
                    }
                } else {
                    showAlert("Authentication Failed: " + error.message.replace("Firebase: ", ""));
                }
            }
        });

        // Google Authentication
        document.getElementById('googleSignInBtn').addEventListener('click', async () => {
            clearAlert();
            try { await signInWithPopup(auth, googleProvider); } catch (error) { showAlert(error.message.replace("Firebase: ", "")); }
        });

        // Recovery Link Handling
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlert();
            try {
                await sendPasswordResetEmail(auth, document.getElementById('forgotEmail').value);
                showAlert("Reset link sent successfully! Please verify inside your Spam/Junk folders.", true);
                document.getElementById('forgotEmail').value = "";
            } catch (error) {
                showAlert(error.message.replace("Firebase: ", ""));
            }
        });

        // Panel Navigation Interactions
        document.getElementById('showForgotBtn').addEventListener('click', () => { authCard.classList.add('hidden'); forgotCard.classList.remove('hidden'); clearAlert(); });
        document.getElementById('backToLoginBtn').addEventListener('click', () => { forgotCard.classList.add('hidden'); authCard.classList.remove('hidden'); clearAlert(); });

        // Logout Event
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try { await signOut(auth); } catch (error) { alert(error.message); }
        });

        // Session Observer Router
        onAuthStateChanged(auth, (user) => {
            clearAlert();
            if (user) {
                authCard.classList.add('hidden');
                forgotCard.classList.add('hidden');
                dashboardCard.classList.remove('hidden');
                userDisplayEmail.textContent = `Logged in as: ${user.email}`;
            } else {
                dashboardCard.classList.add('hidden');
                authCard.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
