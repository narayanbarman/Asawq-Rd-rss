<!DOCTYPE html>
<html>
<head>
  <title>Medicine App</title>
  <style>
    body { font-family: Arial; margin: 0; }
    .center { display:flex; height:100vh; justify-content:center; align-items:center; flex-direction:column; }
    .hidden { display:none; }

    #home { display:flex; height:100vh; }

    #sidebar {
      width:300px;
      background:#f2f2f2;
      padding:20px;
      box-sizing:border-box;
    }

    #content {
      flex:1;
      padding:20px;
    }

    input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
    }

    button {
      padding:10px;
      width:100%;
      cursor:pointer;
    }

    .tag {
      display:inline-block;
      background:#4CAF50;
      color:white;
      padding:5px 10px;
      margin:5px;
      border-radius:20px;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="center">
  <h2>Medicine App Login</h2>
  <button onclick="googleLogin()">Login with Google</button>
</div>

<!-- HOME PAGE -->
<div id="home" class="hidden">

  <div id="sidebar">
    <h3>Add Medicine</h3>
    <input id="medicineInput" placeholder="Enter medicine name">
    <button onclick="addMedicine()">Add</button>
  </div>

  <div id="content">
    <h2>Your Medicines</h2>
    <div id="medicineList"></div>
  </div>

</div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  import {
    getFirestore,
    collection,
    addDoc,
    query,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 🔥 YOUR FIREBASE CONFIG (replace this)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  // LOGIN
  window.googleLogin = async function () {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  }

  // AUTH STATE
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("home").classList.remove("hidden");
      loadMedicines();
    }
  });

  // ADD MEDICINE
  window.addMedicine = async function () {
    const value = document.getElementById("medicineInput").value;
    if (!value) return;

    await addDoc(collection(db, "medicines"), {
      name: value,
      userId: currentUser.uid,
      time: Date.now()
    });

    document.getElementById("medicineInput").value = "";
  }

  // LOAD MEDICINES
  function loadMedicines() {
    const q = query(collection(db, "medicines"));

    onSnapshot(q, (snapshot) => {
      const list = document.getElementById("medicineList");
      list.innerHTML = "";

      snapshot.forEach((doc) => {
        const data = doc.data();

        if (data.userId === currentUser.uid) {
          const span = document.createElement("span");
          span.className = "tag";
          span.innerText = data.name;
          list.appendChild(span);
        }
      });
    });
  }

</script>

</body>
</html>
