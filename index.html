<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FastRx Pro Portal</title>

<style>
:root {
  --bg-dark: #0f172a;
  --card-bg: #1e293b;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --primary-neon: #06b6d4;
  --success-neon: #10b981;
  --danger-neon: #f43f5e;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: var(--bg-dark);
  color: var(--text-main);
  margin: 0;
  padding: 20px;
  box-sizing: border-box;
}

.portal-container {
  background: var(--card-bg);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  text-align: center;
  width: 100%;
  max-width: 380px;
}

h2 {
  font-size: 28px;
  margin: 0 0 8px 0;
  letter-spacing: 0.5px;
}

.brand-accent {
  color: var(--primary-neon);
}

.subtitle {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 30px;
}

button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-google {
  background: transparent;
  color: var(--text-main);
  border: 2px solid #334155;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-google:hover {
  background: rgba(255, 255, 255, 0.03);
  border-color: var(--primary-neon);
}

.btn-logout {
  background: rgba(244, 63, 94, 0.1);
  color: var(--danger-neon);
  border: 1px solid rgba(244, 63, 94, 0.2);
  margin-top: 25px;
}

.btn-logout:hover {
  background: var(--danger-neon);
  color: white;
}

/* Success Layout Styles */
.success-badge {
  width: 60px;
  height: 60px;
  background: rgba(16, 185, 129, 0.1);
  border: 2px solid var(--success-neon);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px auto;
  color: var(--success-neon);
  font-size: 28px;
  font-weight: bold;
}

.user-email-display {
  background: rgba(0, 0, 0, 0.2);
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  word-break: break-all;
  color: var(--primary-neon);
}

/* Live Debug Console Log Window */
.debug-console {
  width: 100%;
  max-width: 380px;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 12px;
  margin-top: 20px;
  padding: 15px;
  box-sizing: border-box;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  text-align: left;
}

.debug-title {
  color: #64748b;
  margin-bottom: 8px;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 1px;
}

.debug-logs {
  max-height: 100px;
  overflow-y: auto;
  color: #a7f3d0;
  white-space: pre-wrap;
}

.hidden {
  display: none !important;
}
</style>
</head>
<body>

<!-- MAIN INTERFACE CARD -->
<div class="portal-container">
  
  <!-- SIGN IN STATE -->
  <div id="loginViewState">
    <h2>FastRx <span class="brand-accent">Pro</span></h2>
    <div class="subtitle">Clinical Authentication Terminal</div>
    
    <button id="googleLoginBtn" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SUCCESS STATE (Hidden Initially) -->
  <div id="successViewState" class="hidden">
    <div class="success-badge">✓</div>
    <h2>Access Granted</h2>
    <div class="subtitle">Medical Session Active</div>
    
    <p style="text-align: left; font-size: 13px; color: var(--text-muted); margin-bottom: 5px;">Authenticated Operator:</p>
    <div id="userEmail" class="user-email-display">Checking session...</div>
    
    <button id="logoutBtn" class="btn-logout">Terminate Session (Logout)</button>
  </div>

</div>

<!-- REAL-TIME DEBUG TERMINAL LOG -->
<div class="debug-console">
  <div class="debug-title">⚙️ System Diagnostic Console</div>
  <div id="debugLogs" class="debug-logs">Initializing auth system...</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// Diagnostic logger setup
const logOutput = document.getElementById('debugLogs');
function debugLog(message) {
  const timestamp = new Date().toLocaleTimeString();
  logOutput.innerText += `\n[${timestamp}] ${message}`;
  console.log(`[DEBUG] ${message}`);
}

// 1. Initialize Supabase Client
const supabase = createClient(
  'https://qejpughcbxosjdcahqzm.supabase.co',
  'sb_publishable_l6259X-5NrXjszGC3ex9Hw_pl9ieLfo'
)
debugLog("Supabase Client Loaded.");

// 2. Trigger Google OAuth
async function signInGoogle(){
  debugLog("Redirecting operator to Google Auth Gateway...");
  try {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: 'https://narayanbarman.github.io/Asawq-Rd-rss/'
      }
    });
    if (error) throw error;
  } catch (err) {
    debugLog(`🔴 OAuth Dispatch Error: ${err.message}`);
  }
}

// 3. Bind Actions
document.getElementById('googleLoginBtn').addEventListener('click', signInGoogle);
document.getElementById('logoutBtn').addEventListener('click', async () => {
  debugLog("Terminating session tokens...");
  await supabase.auth.signOut();
  window.location.href = 'https://narayanbarman.github.io/Asawq-Rd-rss/';
});

// 4. LISTEN FOR REAL-TIME AUTH STATE CHANGES
// This catches the token immediately when Google hands control back to your site
supabase.auth.onAuthStateChange((event, session) => {
  debugLog(`Auth State Fired Event: [${event}]`);
  
  if (session && session.user) {
    debugLog(`✅ Active User Context Found: ${session.user.email}`);
    
    // Switch Visual States
    document.getElementById('loginViewState').classList.add('hidden');
    document.getElementById('successViewState').classList.remove('hidden');
    document.getElementById('userEmail').innerText = session.user.email;
  } else {
    debugLog("ℹ️ No active authorization session found. Ready for login.");
    // Force view reset to login state if not authorized
    document.getElementById('loginViewState').classList.remove('hidden');
    document.getElementById('successViewState').classList.add('hidden');
  }
});
</script>

</body>
</html>
