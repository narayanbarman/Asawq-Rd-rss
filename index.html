<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Prescription Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .hidden { display: none !important; }
        .template-section { margin: 20px 0; padding: 15px; background: #e9ecef; border-radius: 5px; }
        .pill { display: inline-block; background: #fff; padding: 8px 12px; margin: 5px; border-radius: 20px; border: 1px solid #ced4da; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .pill:hover { background: #007bff; color: white; border-color: #007bff; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 120px; }
        .prescription-output { border: 2px solid #333; padding: 20px; margin-top: 30px; background: #fff; }
        @media print {
            body * { visibility: hidden; }
            .prescription-output, .prescription-output * { visibility: visible; }
            .prescription-output { position: absolute; left: 0; top: 0; width: 100%; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="flex">
        <h2>Prescription Portal Login</h2>
        <button id="login-btn">Sign in with Google</button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="flex">
            <div>
                <h3>Welcome, Dr. <span id="doc-name">---</span></h3>
                <p style="margin:0; font-size:12px; color:gray;" id="doc-email"></p>
            </div>
            <button id="logout-btn" style="background:#dc3545;">Logout</button>
        </div>
        
        <hr style="margin:20px 0; border:0; border-top:1px solid #ddd;">

        <div class="template-section">
            <h4>⚡ Fast Click Medicine Templates</h4>
            <div id="template-container">
                </div>
        </div>

        <div class="flex" style="gap: 20px; align-items: flex-start;">
            <div style="flex: 1;">
                <h4>Patient Info</h4>
                <input type="text" id="patient-name" placeholder="Patient Full Name">
                <input type="number" id="patient-age" placeholder="Age" style="width: 48%; display:inline-block;">
                <input type="text" id="patient-sex" placeholder="Sex (M/F/O)" style="width: 48%; display:inline-block; float:right;">
                
                <h4>Rx / Medicine Details</h4>
                <textarea id="prescription-text" placeholder="Click templates above or type custom instructions here..."></textarea>
                
                <button id="save-print-btn" style="width: 100%; margin-top: 10px; background: #28a745;">Save & Print Prescription</button>
            </div>
        </div>

        <div id="print-area" class="prescription-output hidden">
            <h2 style="text-align: center; margin-bottom: 5px;">PRESCRIPTION</h2>
            <p style="text-align: center; margin-top: 0; color: gray;">Generated via Cloud Portal</p>
            <div class="flex" style="border-bottom: 1px solid #333; padding-bottom: 10px;">
                <p><strong>Doctor:</strong> Dr. <span id="print-doc"></span></p>
                <p><strong>Date:</strong> <span id="print-date"></span></p>
            </div>
            <div style="padding: 15px 0; border-bottom: 1px solid #eee;">
                <p><strong>Patient:</strong> <span id="print-p-name"></span> &nbsp;&nbsp;|&nbsp;&nbsp; <strong>Age/Sex:</strong> <span id="print-p-meta"></span></p>
            </div>
            <div style="min-height: 200px; padding-top: 15px;">
                <h3 style="margin-top:0;">Rx:</h3>
                <p id="print-rx" style="white-space: pre-wrap; line-height: 1.6;"></p>
            </div>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
