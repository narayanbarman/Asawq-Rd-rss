<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FastRx Pro | Premium Doctor Portal</title>
  <!-- Tailwind CSS + Google Fonts + Font Awesome (for extra polish) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Custom overrides + premium breathing glow animation */
    * {
      font-family: 'Inter', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #f0f4fa 0%, #e9eef4 100%);
    }
    /* Breathing glow animation for the "New User" badge */
    @keyframes breatheGlow {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4);
        text-shadow: 0 0 0px rgba(34, 211, 238, 0);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 12px 2px rgba(34, 211, 238, 0.7);
        text-shadow: 0 0 4px rgba(34, 211, 238, 0.3);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(34, 211, 238, 0);
        text-shadow: 0 0 0px rgba(34, 211, 238, 0);
      }
    }
    .new-user-badge {
      animation: breatheGlow 2s ease-in-out infinite;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(105deg, #0f4c5f, #1a6e5c);
      color: white;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    /* Premium focus ring override */
    .input-focus-ring:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.2);
      border-color: #14b8a6;
    }
    /* Modal backdrop blur animation */
    .modal-backdrop {
      transition: opacity 0.2s ease, visibility 0.2s;
    }
    .modal-card {
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.2s;
    }
    .tab-active {
      background: white;
      color: #0f4c5f;
      box-shadow: 0 4px 12px -6px rgba(0, 0, 0, 0.1);
    }
    .tab-inactive {
      background: transparent;
      color: #5a6e7c;
    }
    /* Custom Google SVG */
    .google-svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-5">

  <!-- Main Premium Card (centered) -->
  <div class="w-full max-w-md relative z-10">
    <div class="bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl border border-white/40 p-6 md:p-8 transition-all duration-300"
         style="box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.5);">
      
      <!-- Header with medical icon & premium glow -->
      <div class="flex justify-center mb-6">
        <div class="bg-gradient-to-br from-cyan-50 to-slate-100 p-3 rounded-2xl shadow-lg shadow-cyan-200/30 border border-cyan-100/60">
          <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-cyan-600 to-teal-700 flex items-center justify-center shadow-inner">
            <i class="fas fa-prescription-bottle text-white text-3xl drop-shadow-sm"></i>
          </div>
        </div>
      </div>
      
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent">FastRx Pro</h1>
        <p class="text-xs text-slate-500 mt-1 tracking-wide">Professional Cloud Prescription Suite</p>
      </div>
      
      <!-- Segmented Tab Switcher (Pill) -->
      <div class="bg-slate-100/70 p-1 rounded-full flex mb-8 border border-slate-200/80">
        <button id="signinTabBtn" class="tab-btn flex-1 py-2.5 rounded-full text-sm font-semibold transition-all duration-200 tab-active">
          Sign In
        </button>
        <button id="registerTabBtn" class="tab-btn flex-1 py-2.5 rounded-full text-sm font-semibold transition-all duration-200 tab-inactive relative">
          Register
          <!-- Premium "New User" badge (visible only on Register tab button) -->
          <span id="newUserBadge" class="new-user-badge absolute -top-2 -right-1 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md whitespace-nowrap">
            ✨ New User
          </span>
        </button>
      </div>
      
      <!-- Dynamic Form Container (Sign In and Register share same fields but different validation logic) -->
      <div id="formContainer">
        <form id="authForm" action="javascript:void(0);">
          <!-- Email Field -->
          <div class="mb-5">
            <label class="block text-xs font-semibold text-slate-600 mb-1.5 tracking-wide uppercase">Medical Email</label>
            <div class="relative">
              <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
              <input type="email" id="emailInput" required class="w-full pl-10 pr-4 py-3 bg-slate-50/80 border border-slate-200 rounded-xl text-sm focus:border-cyan-400 transition-all input-focus-ring"
                     placeholder="doctor@clinic.com" value="">
            </div>
          </div>
          
          <!-- Password Field with Toggle Eye -->
          <div class="mb-7">
            <label class="block text-xs font-semibold text-slate-600 mb-1.5 tracking-wide uppercase">Secure Key</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
              <input type="password" id="passwordInput" required class="w-full pl-10 pr-12 py-3 bg-slate-50/80 border border-slate-200 rounded-xl text-sm focus:border-cyan-400 transition-all input-focus-ring"
                     placeholder="••••••••">
              <button type="button" id="togglePasswordBtn" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
                <svg id="eyeOpenIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <svg id="eyeClosedIcon" style="display: none;" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              </button>
            </div>
          </div>
          
          <!-- Dynamic Submit Button -->
          <button type="submit" id="actionSubmitBtn" class="w-full bg-gradient-to-r from-cyan-600 to-cyan-700 hover:from-cyan-700 hover:to-cyan-800 text-white font-semibold py-3 rounded-xl transition-all duration-200 shadow-md shadow-cyan-500/20 active:scale-[0.99] text-sm tracking-wide">
            Secure Log In
          </button>
        </form>
      </div>
      
      <!-- Divider & Third-Party Auth -->
      <div class="relative my-7">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-200/80"></div>
        </div>
        <div class="relative flex justify-center text-xs">
          <span class="px-3 bg-white/70 backdrop-blur-sm text-slate-500 rounded-full">Or secure connect with</span>
        </div>
      </div>
      
      <!-- Google Authentication Button (Mock Social Login) -->
      <button id="googleAuthBtn" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 transition-all rounded-xl py-3 shadow-sm group active:scale-[0.98]">
        <svg class="google-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
        </svg>
        <span class="text-sm font-medium text-slate-700">Continue with Google</span>
      </button>
      
      <!-- subtle legal line -->
      <p class="text-center text-[11px] text-slate-400 mt-6">HIPAA-ready · secure cloud sync</p>
    </div>
  </div>
  
  <!-- Smart Intercept Modal Popup (Elegant Overlay) -->
  <div id="interceptModal" class="fixed inset-0 z-50 flex items-center justify-center px-4 opacity-0 invisible transition-all duration-300 modal-backdrop" style="background: rgba(15, 25, 35, 0.7); backdrop-filter: blur(8px);">
    <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl transform scale-95 transition-all duration-300 modal-card border border-white/40">
      <div class="flex justify-end">
        <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times"></i></button>
      </div>
      <div class="text-center my-3">
        <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fas fa-user-shield text-amber-600 text-2xl"></i>
        </div>
        <h3 class="text-xl font-bold text-slate-800">Account Not Found</h3>
        <p class="text-sm text-slate-500 mt-2 px-2">
          You are a new user. You need to <strong>register your chamber profile</strong> before accessing the prescription printer app.
        </p>
        <div class="mt-6 flex flex-col sm:flex-row gap-3">
          <button id="modalRegisterActionBtn" class="flex-1 bg-gradient-to-r from-cyan-600 to-cyan-700 hover:from-cyan-700 hover:to-cyan-800 text-white font-semibold py-2.5 rounded-xl transition shadow-md">
            Click to Open Register Page
          </button>
          <button id="modalFixEmailBtn" class="flex-1 border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 font-medium py-2.5 rounded-xl transition">
            Fix Email Entry
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // ------------- PREMIUM INTERCEPT LOGIC -------------
    // Mock database of existing doctors / registered emails
    const existingDoctors = [
      "doctor@test.com",
      "dr.sarah@fastrx.com",
      "clinic@healthplus.com",
      "narayanbarman3210@gmail.com"
    ];
    
    // DOM elements
    const signinTab = document.getElementById('signinTabBtn');
    const registerTab = document.getElementById('registerTabBtn');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const actionBtn = document.getElementById('actionSubmitBtn');
    const togglePasswordBtn = document.getElementById('togglePasswordBtn');
    const eyeOpen = document.getElementById('eyeOpenIcon');
    const eyeClosed = document.getElementById('eyeClosedIcon');
    const newUserBadge = document.getElementById('newUserBadge');
    const authForm = document.getElementById('authForm');
    const modal = document.getElementById('interceptModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalRegisterAction = document.getElementById('modalRegisterActionBtn');
    const modalFixEmail = document.getElementById('modalFixEmailBtn');
    
    let currentTab = 'signin'; // 'signin' or 'register'
    
    // Helper: update button text & badge visibility
    function updateUIForTab() {
      if (currentTab === 'signin') {
        actionBtn.innerText = 'Secure Log In';
        // Hide badge on the button (badge is on register tab button)
        // but badge visibility controlled by separate function
        newUserBadge.style.display = 'inline-flex';  // always visible on Register tab button, not here
        // but visually: when signin active, the badge still exists on register button, but no extra action
      } else {
        actionBtn.innerText = 'Initialize Doctor Profile';
        // keep badge visible on register tab button
      }
      // ensure badge visibility: show if currentTab is 'register'? Actually badge is part of register tab button, not dynamic tab.
      // we will just toggle its opacity: it's always visible on the register button but we never hide it entirely.
      // According to requirement: badge must automatically hide itself when user switches to Register view? 
      // Actually requirement: "The badge must automatically hide itself when the user switches to the 'Register' view"
      // Wait: That means when you are on Register view, the badge should disappear (because you're already in registration).
      // So badge shows only on the "Register" tab BUTTON while you are on Sign In view. Once you click Register, badge fades out.
      if (currentTab === 'register') {
        newUserBadge.style.opacity = '0';
        newUserBadge.style.visibility = 'hidden';
        newUserBadge.style.display = 'none';
      } else {
        newUserBadge.style.opacity = '1';
        newUserBadge.style.visibility = 'visible';
        newUserBadge.style.display = 'inline-flex';
      }
    }
    
    function setActiveTabStyles() {
      if (currentTab === 'signin') {
        signinTab.classList.add('tab-active');
        signinTab.classList.remove('tab-inactive');
        registerTab.classList.add('tab-inactive');
        registerTab.classList.remove('tab-active');
      } else {
        registerTab.classList.add('tab-active');
        registerTab.classList.remove('tab-inactive');
        signinTab.classList.add('tab-inactive');
        signinTab.classList.remove('tab-active');
      }
      updateUIForTab();
    }
    
    // Tab switching
    signinTab.addEventListener('click', () => {
      if (currentTab === 'signin') return;
      currentTab = 'signin';
      setActiveTabStyles();
      // clear any modal leftover style
    });
    
    registerTab.addEventListener('click', () => {
      if (currentTab === 'register') return;
      currentTab = 'register';
      setActiveTabStyles();
    });
    
    // Password visibility toggle (SVG swap)
    let isPasswordVisible = false;
    togglePasswordBtn.addEventListener('click', () => {
      if (isPasswordVisible) {
        passwordInput.type = 'password';
        eyeOpen.style.display = 'inline-block';
        eyeClosed.style.display = 'none';
      } else {
        passwordInput.type = 'text';
        eyeOpen.style.display = 'none';
        eyeClosed.style.display = 'inline-block';
      }
      isPasswordVisible = !isPasswordVisible;
    });
    
    // ---------- Smart Intercept Popup Logic ----------
    function showInterceptModal(emailAttempt) {
      // store email to re-populate after switching to register tab
      window.pendingEmail = emailAttempt;
      modal.classList.remove('opacity-0', 'invisible');
      modal.classList.add('opacity-100', 'visible');
      // tiny animation to modal-card
      const cardEl = modal.querySelector('.modal-card');
      cardEl.classList.remove('scale-95');
      cardEl.classList.add('scale-100');
    }
    
    function hideInterceptModal() {
      modal.classList.add('opacity-0', 'invisible');
      modal.classList.remove('opacity-100', 'visible');
      const cardEl = modal.querySelector('.modal-card');
      cardEl.classList.add('scale-95');
      cardEl.classList.remove('scale-100');
    }
    
    // Main submission handler (intercept loop)
    function handleFormSubmit(e) {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      if (!email) {
        // gentle alert but not ugly: use modal? better inline message but requirement: intercept only for missing account on signin.
        alert("Please enter your medical email address.");
        return;
      }
      if (!password) {
        alert("Please enter your secure key.");
        return;
      }
      
      // REGISTER MODE: no intercept check needed for registration – just simulate success message
      if (currentTab === 'register') {
        // Simulate registration success - just show a fancy alert and maybe stay
        alert(`✨ Welcome! Your chamber profile for ${email} is being initialized. Premium access granted.`);
        // In real scenario, you'd firebase create user. Here we just mock onboarding.
        // Optionally add email to existingDoctors? For demo, we can add but not needed.
        if (!existingDoctors.includes(email)) {
          existingDoctors.push(email); // for demo continuity
        }
        console.log("New doctor registered (mock):", email);
        return;
      }
      
      // SIGN IN MODE: Check if email exists in mock existing doctors array
      const emailExists = existingDoctors.some(existing => existing.toLowerCase() === email.toLowerCase());
      
      if (!emailExists) {
        // Intercept: show beautiful modal popup
        showInterceptModal(email);
        return;
      }
      
      // If email exists: proceed to login success simulation
      alert(`✅ Welcome back, ${email}. You are securely signed in to FastRx Pro. Prescription dashboard ready.`);
      // Further action could redirect to main app – but within this demo we keep on same page.
    }
    
    // Modal actions:
    // "Click to Open Register Page" -> closes modal, switches to Register tab, keeps email typed.
    modalRegisterAction.addEventListener('click', () => {
      if (window.pendingEmail) {
        emailInput.value = window.pendingEmail;
      }
      // Switch tab to Register
      if (currentTab !== 'register') {
        currentTab = 'register';
        setActiveTabStyles();
      }
      hideInterceptModal();
      // Optionally focus on password field to complete registration
      passwordInput.focus();
    });
    
    // "Fix Email Entry" -> just dismiss modal
    modalFixEmail.addEventListener('click', () => {
      hideInterceptModal();
      emailInput.focus();
    });
    
    closeModalBtn.addEventListener('click', () => {
      hideInterceptModal();
    });
    
    // Click outside modal background to close
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        hideInterceptModal();
      }
    });
    
    // Google Auth Button (Mock social login, just showcase)
    const googleBtn = document.getElementById('googleAuthBtn');
    googleBtn.addEventListener('click', () => {
      // mock google sign-in: intercept logic similar? For demonstration: simulate with a random email.
      const mockGoogleEmail = "dr.premium@gmail.com";
      // Check if exists? For demo we just show toast
      if (existingDoctors.some(em => em.toLowerCase() === mockGoogleEmail.toLowerCase())) {
        alert(`✅ Google Connect: Welcome ${mockGoogleEmail}, you're signed in.`);
      } else {
        // smart intercept for Google as well?
        window.pendingEmail = mockGoogleEmail;
        showInterceptModal(mockGoogleEmail);
      }
    });
    
    // Attach form submit
    authForm.addEventListener('submit', handleFormSubmit);
    
    // Initial UI sync
    setActiveTabStyles();
    
    // Prefill optional demo email (to show intercept, leave empty but any new email triggers modal)
    // For testing, leave input empty so doctors can type new@clinic.com
    // Set placeholder visual
    emailInput.placeholder = "doctor@clinic.com";
    
    // Ensure newUserBadge starts visible (since default tab is signin)
    // also init eye icons
    eyeOpen.style.display = 'inline-block';
    eyeClosed.style.display = 'none';
    isPasswordVisible = false;
  </script>
</body>
</html>
