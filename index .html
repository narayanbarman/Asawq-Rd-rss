<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FastRx Login</title>

<style>
body{
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#eef2f7;
}
.card{
  background:#fff;
  padding:30px;
  border-radius:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  text-align:center;
  width:320px;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#0a7e8c;
  color:white;
  font-size:16px;
  cursor:pointer;
}
button:hover{
  opacity:.95;
}
#userBox{
  margin-top:20px;
}
</style>
</head>
<body>

<div class="card">
  <h2>FastRx Pro</h2>
  <p>Doctor Login</p>

  <button id="googleLoginBtn">
    Continue with Google
  </button>

  <div id="userBox"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://qejpughcbxosjdcahqzm.supabase.co',
  'sb_publishable_l6259X-5NrXjszGC3ex9Hw_pl9ieLfo'
)

async function signInGoogle(){
  await supabase.auth.signInWithOAuth({
    provider:'google'
  })
}

document
.getElementById('googleLoginBtn')
.addEventListener('click',signInGoogle)

async function checkUser(){
  const { data } = await supabase.auth.getUser()

  if(data.user){
    document.getElementById('userBox').innerHTML=`
      <p>Logged in as:</p>
      <b>${data.user.email}</b>
      <br><br>
      <button onclick="logout()">Logout</button>
    `
  }
}

window.logout = async function(){
  await supabase.auth.signOut()
  location.reload()
}

checkUser()
</script>

</body>
</html>
